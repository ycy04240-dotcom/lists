<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>문구 제품 둘러보기</title>
<style>
  @font-face {
    font-family: 'DungGeunMo';
    src: url('https://fastly.jsdelivr.net/gh/projectnoonnu/noonfonts_2001@1.1/DungGeunMo.woff') format('woff');
    font-weight: normal; font-display: swap;
  }
  :root {
    --bg: #fffbe6;          /* 화사한 파스텔 옐로우 */
    --dot: #ffffff;         /* 땡땡이 무늬 (밝은 화이트) */
    --panel: #ffffff;
    --ink: #33406e;         /* 남색 픽셀 테두리 */
    --line: #c9d8ef;
    --text: #2f3a5f;
    --sub: #8a97b8;
    --accent: #33406e;
    --pop: #4fb3f0;         /* 하늘색 포인트 */
    --red: #ff5a4e;
    --green: #2ea87c;
    --blue: #3b82c4;
    --paper1: #fff6c9; --paper2: #ffe3ef; --paper3: #dcf5e5; --paper4: #dbefff; --paper5: #eee4ff;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: "Pretendard", "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
    background: var(--bg); color: var(--text);
    background-image:
      radial-gradient(var(--dot) 1.5px, transparent 2px),
      radial-gradient(var(--dot) 1.2px, transparent 1.7px);
    background-size: 18px 18px, 18px 18px;
    background-position: 0 0, 9px 9px;
    min-height: 100vh;
  }
  header {
    padding: 13px 24px; background: var(--panel);
    display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
    position: sticky; top: 0; z-index: 50;
  }
  header h1 {
    font-family: "DungGeunMo", "Pretendard", sans-serif; font-size: 23px; font-weight: 400;
    letter-spacing: .5px; display: flex; align-items: center; gap: 8px;
    color: var(--ink);
  }
  header h1::before { content: "🌰"; font-size: 19px; display: inline-block; transform: rotate(-8deg); }
  header .hint {
    font-size: 11.5px; color: var(--ink); background: #e3f3fe;
    border-radius: 2px; padding: 3px 11px;
    transform: rotate(-1.2deg); font-weight: 600;
  }
  .spacer { flex: 1; }
  .btn {
    border: none; background: #fdf1cf; color: var(--text);
    padding: 8px 13px; border-radius: 2px; font-size: 13px; cursor: pointer;
    transition: all .12s; font-family: inherit; font-weight: 600;
  }
  .btn:hover { transform: translateY(-1px); background: #ffe6a6; }
  .btn:active { transform: translateY(1px); }
  .btn.primary { background: var(--pop); color: #fff; }
  .btn.on { background: var(--pop); color: #fff; }
  #searchBox {
    border: 1.5px solid transparent; border-radius: 2px; padding: 8px 12px;
    font-size: 13px; font-family: inherit; width: 220px; background: #fdf1cf;
    transition: all .12s;
  }
  #searchBox:focus { outline: none; border-color: var(--pop); }

  /* ── 예시 데이터 안내 배너 ── */
  #demoBanner {
    background: #fdf6e3; border-bottom: 1px solid #ecdfb8; padding: 9px 24px;
    font-size: 12.5px; color: #7a6a33; display: flex; align-items: center; gap: 10px;
  }
  #demoBanner button { margin-left: auto; }

  /* ── 쇼핑몰 바로가기 ── */
  #linkSec { padding: 16px 24px 0; }
  .linkPanel {
    background: var(--panel); border-radius: 2px;
    padding: 13px 16px;
  }
  .linkHead { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
  .linkHead h2 { font-family: "DungGeunMo", "Pretendard", sans-serif; font-size: 18px; font-weight: 700; flex-shrink: 0; }
  .linkTabs { display: flex; gap: 5px; }
  .linkTab {
    border: none; background: #fdf1cf; color: var(--text);
    border-radius: 2px; padding: 4px 11px; font-size: 12px; cursor: pointer; font-family: inherit; font-weight: 600;
    transition: all .12s;
  }
  .linkTab:hover { background: #ffe6a6; transform: translateY(-1px); }
  .linkTab.on { background: var(--pop); color: #fff; }
  .linkTab .cnt { opacity: .6; font-size: 10.5px; margin-left: 2px; }
  .linkAddForm { display: flex; gap: 6px; margin-left: auto; flex-wrap: wrap; }
  .linkAddForm input {
    border: 1.5px solid transparent; border-radius: 2px; padding: 7px 10px;
    font-size: 12.5px; font-family: inherit; background: #fdf1cf;
  }
  .linkAddForm input:focus { outline: none; border-color: #b9b6af; }
  #lnName { width: 130px; }
  #lnUrl { width: 250px; }
  .linkList { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 11px; }
  .linkItem {
    display: flex; align-items: center; gap: 8px; border: none;
    border-radius: 2px; padding: 5px 8px; font-size: 12.5px; background: transparent;
    max-width: 100%;
  }
  .linkItem img.favicon { width: 16px; height: 16px; border-radius: 3px; flex-shrink: 0; }
  .linkItem a { color: var(--text); text-decoration: none; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 180px; }
  .linkItem a:hover { text-decoration: underline; }
  .linkItem .host { color: var(--sub); font-size: 11px; }
  .linkItem .time { font-size: 10.5px; color: var(--sub); }
  .linkItem button { border: none; background: none; cursor: pointer; font-size: 15px; padding: 1px 2px; color: var(--sub); font-family: inherit; }
  .linkItem button.star.on { color: #e0245e; }
  .linkItem button.star:hover { color: #e0245e; }
  .linkItem button.del:hover { color: var(--red); }
  .linkEmpty { font-size: 12px; color: var(--sub); margin-top: 10px; line-height: 1.6; }
  /* 접힌 상태: 접기 버튼만 남기고 모두 숨김 */
  .linkPanel.folded .linkTabs, .linkPanel.folded .linkAddForm, .linkPanel.folded .linkList { display: none; }
  #linkFoldBtn { font-weight: 700; }
  /* 필터(쇼핑몰·카테고리·키워드) 접기 */
  #filterBar.folded #mallChips, #filterBar.folded #catChips, #filterBar.folded #kwRow { display: none; }
  #filterFoldBtn { font-weight: 700; }
  .linkItem button.del { font-size: 10px; opacity: .5; }
  .linkItem button.del:hover { opacity: 1; }
  /* 📋 링크 모음: 세로 리스트 형태 */
  .linkList.listMode { flex-direction: column; gap: 6px; max-height: 300px; overflow-y: auto; }
  .linkList.listMode .linkItem { width: 100%; }
  .linkList.listMode .linkItem a { max-width: none; flex: 1; }

  /* ── 필터 바 ── */
  #filterBar {
    padding: 14px 24px 4px; display: flex; flex-direction: column; gap: 9px;
  }
  .chipRow { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
  .chipRow .rowLbl { font-size: 11.5px; font-weight: 700; color: var(--sub); width: 56px; flex-shrink: 0; letter-spacing: .5px; }
  .chip {
    border: none; background: #fdf1cf; color: var(--text);
    padding: 5px 12px; border-radius: 2px; font-size: 12.5px; cursor: pointer;
    transition: all .12s; font-family: inherit; font-weight: 600;
  }
  .chip:hover { background: #ffe6a6; transform: translateY(-1px) rotate(-.5deg); }
  .chip.on { background: var(--pop); color: #fff; }
  .chip .cnt { opacity: .55; font-size: 11px; margin-left: 3px; }
  #sortRow { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; padding: 4px 24px 0; }
  #sortRow select, #sortRow label {
    font-size: 12.5px; font-family: inherit;
  }
  #sortRow select {
    padding: 7px 10px; border: none; border-radius: 2px;
    background: #fdf1cf; color: var(--text); cursor: pointer; font-weight: 600;
  }
  .toggleLbl { display: flex; align-items: center; gap: 5px; font-size: 12.5px; cursor: pointer; color: var(--sub); }
  .toggleLbl input { accent-color: var(--accent); cursor: pointer; }
  #resultCnt { font-size: 12px; color: var(--sub); margin-left: auto; }

  /* ── 제품 그리드 ── */
  #grid {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(210px, 1fr));
    gap: 14px; padding: 16px 24px 40px;
  }
  .card {
    background: var(--panel); border: none; border-radius: 2px;
    overflow: hidden; cursor: pointer; transition: transform .15s;
    position: relative; display: flex; flex-direction: column;
  }
  .card:hover { transform: translateY(-3px); }
  /* 이미지만 보기 모드: 제품명·가격 등 정보 영역 숨김 */
  body.hideInfo .card .body { display: none; }
  .card .imgBox {
    aspect-ratio: 1; background: #fffdf4; display: flex; align-items: center;
    justify-content: center; position: relative; overflow: hidden;
  }
  .card .imgBox img { width: 100%; height: 100%; object-fit: cover; }
  .card .imgBox .noImg { font-size: 30px; opacity: .25; }
  .card .rankBadge {
    position: absolute; top: 8px; left: -5px; background: var(--pop); color: #fff;
    font-family: "DungGeunMo", "Pretendard", sans-serif;
    font-size: 14px; font-weight: 400; padding: 3px 12px; border-radius: 2px;
    transform: rotate(-5deg);
  }
  .card .rankBadge.gold { background: #ffc531; color: var(--ink); }
  .badges { position: absolute; top: 8px; right: 8px; display: flex; flex-direction: column; gap: 4px; align-items: flex-end; }
  .badge {
    font-size: 10.5px; font-weight: 700; padding: 3px 8px; border-radius: 2px; color: #fff;
    transform: rotate(2deg);
  }
  .badge.sale { background: var(--red); }
  .badge.out { background: #999; }
  .badge.best { background: #b8860b; }
  .badge.new { background: var(--green); }
  .card .body { padding: 11px 13px 13px; display: flex; flex-direction: column; gap: 5px; flex: 1; }
  .mallTag {
    display: inline-flex; align-items: center; gap: 4px;
    font-size: 10.5px; font-weight: 700; padding: 2px 8px; border-radius: 2px;
    width: fit-content;
  }
  .mallTag[data-mall] { cursor: pointer; }
  .mallTag[data-mall]:hover { text-decoration: underline; }

  /* ── 카테고리별 묶어보기: 레트로 티켓 라벨 느낌 ── */
  .groupHead {
    width: fit-content; font-family: "DungGeunMo", "Pretendard", sans-serif;
    font-size: 19px; font-weight: 400; letter-spacing: .5px;
    display: flex; align-items: center; gap: 8px; margin: 14px 0 12px;
    padding: 4px 20px; background: #ffffff;
    border-radius: 2px;
    transform: rotate(-.8deg);
  }
  .groupHead .cnt { color: var(--text); opacity: .55; font-size: 13px; }
  .groupGrid {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(210px, 1fr));
    gap: 14px; margin-bottom: 26px;
  }

  /* ── 키워드 칩 ── */
  .chip.kw { background: #fff8dd; }
  .chip.kw.on { background: var(--accent); }
  .chip .x { margin-left: 5px; opacity: .45; font-size: 11px; }
  .chip .x:hover { opacity: 1; }
  a.chip { text-decoration: none; display: inline-flex; align-items: center; }
  .catTag { font-size: 10.5px; color: var(--sub); }
  .card .name {
    font-size: 13px; font-weight: 600; line-height: 1.45;
    display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
    min-height: 2.9em;
  }
  .priceRow { display: flex; align-items: baseline; gap: 6px; flex-wrap: wrap; }
  .priceRow .now { font-family: "DungGeunMo", "Pretendard", sans-serif; font-size: 17px; font-weight: 400; color: var(--red); }
  .priceRow .was { font-size: 11.5px; color: var(--sub); text-decoration: line-through; }
  .priceRow .pct { font-size: 12px; font-weight: 700; color: var(--red); }
  .metaRow { display: flex; align-items: center; gap: 9px; font-size: 11.5px; color: var(--sub); margin-top: auto; padding-top: 4px; }
  .metaRow b { color: var(--text); font-weight: 600; }
  .metaRow .star { color: #d4a017; }
  .cardLink {
    margin-left: auto; text-decoration: none; font-size: 13px; line-height: 1;
    padding: 4px 7px; border: none; border-radius: 2px; background: #fdf1cf;
    transition: all .12s;
  }
  .cardLink:hover { background: #ffe6a6; transform: scale(1.1); }

  /* ── 테이블 뷰 ── */
  #tableWrap { padding: 16px 24px 40px; display: none; overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; background: var(--panel); border-radius: 2px; overflow: hidden; font-size: 12.5px; }
  th, td { padding: 10px 12px; text-align: left; border-bottom: 1px solid var(--line); white-space: nowrap; }
  th { background: #fff3cf; font-size: 11.5px; color: var(--text); font-weight: 700; cursor: pointer; user-select: none; }
  th:hover { color: var(--text); }
  tr:last-child td { border-bottom: none; }
  tbody tr { cursor: pointer; }
  tbody tr:hover { background: #faf9f7; }
  td.name { white-space: normal; min-width: 200px; font-weight: 600; }
  td .was { color: var(--sub); text-decoration: line-through; font-size: 11px; margin-left: 4px; }

  /* ── 가격비교 뷰 ── */
  #compareWrap { padding: 16px 24px 40px; display: none; }
  .cmpCard {
    background: var(--panel); border: none; border-radius: 2px;
    padding: 14px 16px; margin-bottom: 14px;
  }
  .cmpCard h3 { font-family: "DungGeunMo", "Pretendard", sans-serif; font-size: 17px; margin-bottom: 9px; }
  .cmpRow {
    display: flex; align-items: center; gap: 10px; padding: 7px 10px;
    border-radius: 8px; font-size: 12.5px;
  }
  .cmpRow.low { background: #eef7f0; }
  .cmpRow .price { font-weight: 700; margin-left: auto; }
  .cmpRow .lowTag { font-size: 10.5px; font-weight: 700; color: var(--green); }
  .cmpNote { font-size: 12px; color: var(--sub); padding: 4px 24px 0; }

  /* ── 빈 상태 ── */
  #emptyMsg { text-align: center; color: var(--sub); padding: 70px 20px; font-size: 13.5px; line-height: 1.8; display: none; }
  #emptyMsg .big { font-size: 40px; margin-bottom: 8px; }

  /* ── 모달 ── */
  .modalBg {
    position: fixed; inset: 0; background: rgba(30,28,25,.45); z-index: 100;
    display: none; align-items: center; justify-content: center; padding: 20px;
  }
  .modalBg.open { display: flex; }
  .modal {
    background: var(--panel); border: none; border-radius: 4px; padding: 22px;
    width: 100%; max-width: 460px; max-height: 88vh; overflow-y: auto;
    box-shadow: 0 12px 32px rgba(40,50,80,.18);
  }
  .modal h2 { font-size: 15px; margin-bottom: 15px; }
  .fRow { margin-bottom: 10px; }
  .fRow label { display: block; font-size: 11.5px; color: var(--sub); font-weight: 700; margin-bottom: 4px; }
  .fRow input, .fRow select, .fRow textarea {
    width: 100%; padding: 8px 10px; border: 1px solid var(--line); border-radius: 8px;
    font-size: 13px; font-family: inherit; background: var(--panel); color: var(--text);
  }
  .fRow input:focus, .fRow textarea:focus { outline: none; border-color: #b9b6af; }
  .fGrid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 9px; }
  .modalBtns { display: flex; gap: 8px; margin-top: 16px; }
  .modalBtns .btn { flex: 1; }
  .btn.danger { color: var(--red); }
  textarea { min-height: 130px; resize: vertical; font-size: 12px !important; }
  .note {
    font-size: 11px; color: var(--sub); background: #f7f6f3; border-radius: 8px;
    padding: 8px 10px; line-height: 1.6; margin-top: 8px;
  }
</style>
</head>
<body>

<header>
  <h1>문구 제품 둘러보기</h1>
  <span class="hint" id="mallHint">문구 브랜드 상품 모아보기</span>
  <div class="spacer"></div>
  <input id="searchBox" type="search" placeholder="🔍 제품명 검색">
  <button class="btn" id="viewGridBtn">카드</button>
  <button class="btn" id="viewTableBtn">목록</button>
  <button class="btn" id="infoToggleBtn" title="제품명·가격 표시를 켜고 끕니다">🖼️ 이미지만</button>
</header>

<div id="demoBanner">
  ⚠️ 지금 보이는 것은 <b>예시 데이터</b>입니다. 쇼핑몰 URL을 알려주시면 실제 판매 중인 제품으로 채워드려요.
  <button class="btn" id="clearDemoBtn">예시 데이터 지우기</button>
</div>

<div id="linkSec">
  <div class="linkPanel">
    <div class="linkHead">
      <button type="button" class="linkTab" id="linkFoldBtn">▸ 펼치기</button>
      <div class="linkTabs">
        <button class="linkTab" data-tab="fav">💛 찜한 쇼핑몰<span class="cnt" id="favCnt"></span></button>
        <button class="linkTab" data-tab="recent">📋 링크 모음<span class="cnt" id="recentCnt"></span></button>
      </div>
      <form class="linkAddForm" id="linkForm">
        <input id="lnName" placeholder="이름 (예: 스마트스토어)">
        <input id="lnUrl" placeholder="https:// 쇼핑몰 주소 붙여넣기">
        <button class="btn primary" type="submit">+ 주소 추가</button>
      </form>
    </div>
    <div class="linkList" id="linkList"></div>
  </div>
</div>

<div id="filterBar">
  <div id="filterFoldRow"><button type="button" class="linkTab" id="filterFoldBtn">▾ 필터 접기</button></div>
  <div class="chipRow" id="mallChips"><span class="rowLbl">쇼핑몰</span></div>
  <div class="chipRow" id="catChips"><span class="rowLbl">카테고리</span></div>
  <div class="chipRow" id="kwRow" style="display:none;"></div>
</div>

<div id="sortRow">
  <select id="sortSel">
    <option value="rand">🎲 랜덤순</option>
    <option value="new">🆕 최신순</option>
    <option value="pop">🔥 인기순 (판매량)</option>
    <option value="review">💬 리뷰 많은순</option>
    <option value="rating">⭐ 평점 높은순</option>
    <option value="priceAsc">💰 낮은 가격순</option>
    <option value="priceDesc">💎 높은 가격순</option>
    <option value="sale">🏷️ 할인율 높은순</option>
    <option value="name">가나다순</option>
  </select>
  <label class="toggleLbl"><input type="checkbox" id="hideSoldout">품절 제외</label>
  <label class="toggleLbl"><input type="checkbox" id="groupToggle">카테고리별 묶어보기</label>
  <label class="toggleLbl"><input type="checkbox" id="compareToggle">가격비교 모드 (같은 제품 몰별 비교)</label>
  <span id="resultCnt"></span>
</div>

<div id="grid"></div>
<div id="tableWrap"></div>
<div id="compareWrap"></div>
<div id="emptyMsg">
  <div class="big">📦</div>
  표시할 제품이 없어요.<br>
  검색어나 필터를 바꿔보세요.
</div>

<!-- 제품 추가/수정 모달 -->
<div class="modalBg" id="editModal">
  <div class="modal">
    <h2 id="editTitle">제품 추가</h2>
    <div class="fRow"><label>제품명 *</label><input id="fName" placeholder="예: 데일리 보습 크림 100ml"></div>
    <div class="fGrid2">
      <div class="fRow"><label>쇼핑몰 *</label><input id="fMall" list="mallList" placeholder="예: 스마트스토어"><datalist id="mallList"></datalist></div>
      <div class="fRow"><label>카테고리 (비우면 자동 분류)</label><input id="fCat" list="catList" placeholder="예: 다이어리·일기장"><datalist id="catList"></datalist></div>
    </div>
    <div class="fGrid2">
      <div class="fRow"><label>정가 (원)</label><input id="fPrice" type="number" placeholder="25000"></div>
      <div class="fRow"><label>판매가 (원, 할인 시)</label><input id="fSale" type="number" placeholder="비우면 정가 판매"></div>
    </div>
    <div class="fGrid2">
      <div class="fRow"><label>판매량 (인기순 기준)</label><input id="fSales" type="number" placeholder="0"></div>
      <div class="fRow"><label>리뷰 수</label><input id="fReviews" type="number" placeholder="0"></div>
    </div>
    <div class="fGrid2">
      <div class="fRow"><label>평점 (0~5)</label><input id="fRating" type="number" step="0.1" min="0" max="5" placeholder="4.8"></div>
      <div class="fRow"><label>등록일</label><input id="fDate" type="date"></div>
    </div>
    <div class="fRow"><label>상품 페이지 URL</label><input id="fUrl" placeholder="https://..."></div>
    <div class="fRow"><label>이미지 URL</label><input id="fImg" placeholder="https://... (비워도 됨)"></div>

let products = [];
let isDemo = false;

function load() {
  try {
    const raw = localStorage.getItem(LS_KEY);
    if (raw) {
      const d = JSON.parse(raw);
      products = d.products || [];
      isDemo = !!d.isDemo;
      const ver = d.seedVersion || 1;
      if (isDemo || !products.length) {
        // 예시 데이터였다면 실제 수집 데이터로 통째로 교체
        products = SEED.map((p, i) => ({ ...p, id: "seed" + i }));
        isDemo = false;
        persist();
      } else if (ver < SEED_VERSION) {
        // 수집 데이터가 갱신되면: 새 제품은 NEW로 추가, 기존 제품은 업데이트
        SEED.forEach(o => upsertProduct(o));
        persist();
      }
      return;
    }
  } catch (e) {}
  products = SEED.map((p, i) => ({ ...p, id: "seed" + i }));
  isDemo = false;
  persist();
}
function persist() {
  localStorage.setItem(LS_KEY, JSON.stringify({ products, isDemo, seedVersion: SEED_VERSION }));
}
function newId() { return "p" + Date.now() + Math.random().toString(36).slice(2, 6); }

// ═══════════════ 필터 상태 ═══════════════
let filter = { mall: "전체", cat: "전체", q: "", hideSoldout: false };
let sortKey = "rand";    // 기본: 랜덤순

// 랜덤순: 세션 동안 순서 유지, 랜덤순을 다시 선택하면 새로 섞임
let randSeed = {};
const randOf = p => {
  if (!(p.id in randSeed)) randSeed[p.id] = Math.random();
  return randSeed[p.id];
};
let view = "grid";       // grid | table
let compareMode = false;
let grouped = false;     // 카테고리별 묶어보기

const NEW_MS = 7 * 86400000;   // 대시보드에 추가된 지 7일 이내면 NEW
const isNew = p => p.addedAt && (Date.now() - p.addedAt < NEW_MS);

const fmt = n => n == null ? "-" : Number(n).toLocaleString("ko-KR");
const priceOf = p => (p.sale != null && p.sale !== "" ? +p.sale : +p.price) || 0;
const pctOf = p => (p.sale != null && p.sale !== "" && +p.price > 0 && +p.sale < +p.price)
  ? Math.round((1 - p.sale / p.price) * 100) : 0;

function mallColor(mall) {
  const malls = [...new Set(products.map(p => p.mall))].sort();
  return MALL_COLORS[malls.indexOf(mall) % MALL_COLORS.length];
}

function filtered() {
  let list = products.filter(p =>
    (filter.mall === "전체" || p.mall === filter.mall) &&
    (filter.cat === "전체" || (filter.cat === "__new__" ? isNew(p) : p.category === filter.cat)) &&
    (!filter.hideSoldout || !p.soldout) &&
    (!filter.q || (p.name || "").toLowerCase().includes(filter.q))
  );
  const cmp = {
    rand:      (a, b) => randOf(a) - randOf(b),
    // 판매량 정보가 없는 몰은 리뷰 수를 인기 지표로 사용
    pop:       (a, b) => (b.sales || 0) - (a.sales || 0) || (b.reviews || 0) - (a.reviews || 0),
    review:    (a, b) => (b.reviews || 0) - (a.reviews || 0),
    rating:    (a, b) => (b.rating || 0) - (a.rating || 0) || (b.reviews || 0) - (a.reviews || 0),
    priceAsc:  (a, b) => priceOf(a) - priceOf(b),
    priceDesc: (a, b) => priceOf(b) - priceOf(a),
    sale:      (a, b) => pctOf(b) - pctOf(a),
    // 최신순: 대시보드에 들어온 시점(addedAt) 우선, 그다음 등록일
    new:       (a, b) => (b.addedAt || 0) - (a.addedAt || 0) || (b.date || "").localeCompare(a.date || ""),
    name:      (a, b) => (a.name || "").localeCompare(b.name || "", "ko"),
  };
  return list.sort(cmp[sortKey] || cmp.pop);
}

// ═══════════════ 렌더 ═══════════════
// "○○ 스마트스토어"처럼 같은 브랜드의 다른 채널 이름을 하나로 정규화
const brandOf = n => (n || "").replace(/\s*(스마트스토어|브랜드스토어|공식몰|공식스토어|스토어)$/, "").trim();

// 헤더 문구: 제품이 있는 몰 + 바로가기에 등록한 브랜드를 합쳐서 자동 집계
function updateHint() {
  const set = new Set(products.map(p => p.mall));
  links.forEach(l => { const name = brandOf(l.name); if (name) set.add(name); });
  const el = document.getElementById("mallHint");
  if (el) el.textContent = `문구 브랜드 ${set.size}곳 상품 모아보기`;
}

function render() {
  document.getElementById("demoBanner").style.display = isDemo && products.length ? "flex" : "none";
  updateHint();
  renderChips();
  const list = filtered();
  document.getElementById("resultCnt").textContent = `${list.length}개 제품`;

  const grid = document.getElementById("grid");
  const tableWrap = document.getElementById("tableWrap");
  const cmpWrap = document.getElementById("compareWrap");
  grid.style.display = "none"; tableWrap.style.display = "none"; cmpWrap.style.display = "none";
  document.getElementById("emptyMsg").style.display = list.length ? "none" : "block";
  if (!list.length) return;

  if (compareMode) { renderCompare(list); cmpWrap.style.display = "block"; }
  else if (view === "table") { renderTable(list); tableWrap.style.display = "block"; }
  else { renderGrid(list); grid.style.display = grouped ? "block" : "grid"; }
}

function chipHtml(items, cur, key) {
  const counts = {};
  products.forEach(p => {
    const v = key === "mall" ? p.mall : p.category;
    counts[v] = (counts[v] || 0) + 1;
  });
  return ["전체", ...items].map(v =>
    `<button class="chip${v === cur ? " on" : ""}" data-k="${key}" data-v="${v}">${v}` +
    (v === "전체" ? `<span class="cnt">${products.length}</span>` : `<span class="cnt">${counts[v] || 0}</span>`) +
    `</button>`
  ).join("");
}
function renderChips() {
  // 제품이 있는 몰 + 링크로 등록한 브랜드를 합쳐서 칩 생성 (제품이 아직 없어도 표시)
  const linkBrands = links.map(l => brandOf(l.name)).filter(Boolean);
  const malls = [...new Set([...products.map(p => p.mall), ...linkBrands])].sort();
  const cats = [...new Set(products.map(p => p.category))].sort();
  if (filter.mall !== "전체" && !malls.includes(filter.mall)) filter.mall = "전체";
  if (filter.cat !== "전체" && filter.cat !== "__new__" && !cats.includes(filter.cat)) filter.cat = "전체";
  if (filter.cat === "__new__" && !products.some(isNew)) filter.cat = "전체";

  // 쇼핑몰 칩 + 선택한 몰의 사이트 바로가기 (바로가기 목록에서 이름 매칭)
  let mallRow = '<span class="rowLbl">쇼핑몰</span>' + chipHtml(malls, filter.mall, "mall");
  if (filter.mall !== "전체") {
    const lk = findMallLink(filter.mall);
    if (lk) mallRow += `<a class="chip" href="${escHtml(lk.url)}" target="_blank" rel="noopener" title="${escHtml(lk.url)}">↗ ${escHtml(filter.mall)} 사이트 열기</a>`;
  }
  document.getElementById("mallChips").innerHTML = mallRow;

  // 카테고리 칩: '전체' 바로 뒤에 🆕 NEW 칩 삽입
  const newCount = products.filter(isNew).length;
  const newChip = newCount
    ? `<button class="chip${filter.cat === "__new__" ? " on" : ""}" data-k="cat" data-v="__new__">🆕 NEW<span class="cnt">${newCount}</span></button>`
    : "";
  const catHtml = chipHtml(cats, filter.cat, "cat");
  const cut = catHtml.indexOf("</button>") + 9;
  document.getElementById("catChips").innerHTML =
    '<span class="rowLbl">카테고리</span>' + catHtml.slice(0, cut) + newChip + catHtml.slice(cut);

  document.querySelectorAll("#mallChips .chip[data-k], #catChips .chip[data-k]").forEach(c => c.onclick = () => {
    if (c.dataset.k === "mall") filter.mall = c.dataset.v;
    else filter.cat = c.dataset.v;
    render();
  });
  renderKeywords();
  // 모달 datalist도 갱신
  document.getElementById("mallList").innerHTML = malls.map(m => `<option value="${m}">`).join("");
  document.getElementById("catList").innerHTML = cats.map(c => `<option value="${c}">`).join("");
}

function cardHtml(p, rank) {
  const pct = pctOf(p);
  const showRank = (sortKey === "pop" || sortKey === "review") && rank < 3 && !filter.q;
  const rankLbl = sortKey === "review" ? `리뷰 ${rank + 1}위` : `BEST ${rank + 1}`;
  return `<div class="card" data-id="${p.id}">
    <div class="imgBox">
      ${p.img ? `<img src="${p.img}" loading="lazy" referrerpolicy="no-referrer" onerror="this.remove()">` : `<div class="noImg">📦</div>`}
      ${showRank ? `<div class="rankBadge${rank === 0 ? " gold" : ""}">${rankLbl}</div>` : ""}
      <div class="badges">
        ${isNew(p) ? `<span class="badge new">NEW</span>` : ""}
        ${pct ? `<span class="badge sale">${pct}%</span>` : ""}
        ${p.soldout ? `<span class="badge out">품절</span>` : ""}
      </div>
    </div>
    <div class="body">
      <span class="mallTag" data-mall="${escHtml(p.mall)}" title="이 쇼핑몰 제품만 보기" style="background:${mallColor(p.mall)}18;color:${mallColor(p.mall)};">● ${p.mall}</span>
      <span class="catTag">${p.category}</span>
      <div class="name">${p.name}</div>
      <div class="priceRow">
        ${pct ? `<span class="pct">${pct}%</span>` : ""}
        <span class="now">${fmt(priceOf(p))}원</span>
        ${pct ? `<span class="was">${fmt(p.price)}원</span>` : ""}
      </div>
      <div class="metaRow">
        <span>🔥 <b>${fmt(p.sales)}</b></span>
        <span>💬 <b>${fmt(p.reviews)}</b></span>
        <span class="star">★ ${p.rating || "-"}</span>
        ${p.url ? `<a class="cardLink" href="${escHtml(p.url)}" target="_blank" rel="noopener" title="상품 페이지 열기" onclick="event.stopPropagation()">🔗</a>` : ""}
      </div>
    </div>
  </div>`;
}
function renderGrid(list) {
  const grid = document.getElementById("grid");
  if (grouped) {
    // 카테고리별 섹션으로 묶어서 표시 (NEW 먼저, 나머지 가나다순)
    const groups = {};
    list.forEach(p => (groups[p.category] = groups[p.category] || []).push(p));
    grid.innerHTML = Object.keys(groups).sort((a, b) => a.localeCompare(b, "ko")).map(cat =>
      `<div class="groupHead">📂 ${escHtml(cat)}<span class="cnt">${groups[cat].length}개</span></div>` +
      `<div class="groupGrid">${groups[cat].map(p => cardHtml(p, 99)).join("")}</div>`
    ).join("");
  } else {
    grid.innerHTML = list.map((p, i) => cardHtml(p, i)).join("");
  }
  grid.querySelectorAll(".card").forEach(c => {
    const p = products.find(x => x.id === c.dataset.id);
    const imgBox = c.querySelector(".imgBox");
    if (imgBox) imgBox.onclick = e => {       // 이미지 클릭 → 상품 페이지 바로 이동
      e.stopPropagation();
      if (p && p.url) window.open(p.url, "_blank", "noopener");
      else openEdit(c.dataset.id);
    };
    c.onclick = () => openEdit(c.dataset.id); // 정보 영역 클릭 → 수정 팝업
  });
  bindMallTags(grid);
}

// 바로가기 목록에서 쇼핑몰 이름과 맞는 주소 찾기
function findMallLink(mall) {
  const m = (mall || "").trim().toLowerCase();
  if (!m) return null;
  return links.find(l => l.name.trim().toLowerCase() === m)
      || links.find(l => l.name.toLowerCase().includes(m) || m.includes(l.name.toLowerCase()))
      || null;
}

function renderTable(list) {
  const rows = list.map((p, i) => `<tr data-id="${p.id}">
    <td>${i + 1}</td>
    <td class="name">${p.name}${isNew(p) ? ' <span class="badge new">NEW</span>' : ""}${p.soldout ? ' <span class="badge out">품절</span>' : ""}</td>
    <td><span class="mallTag" data-mall="${escHtml(p.mall)}" title="이 쇼핑몰 제품만 보기" style="background:${mallColor(p.mall)}18;color:${mallColor(p.mall)};">${p.mall}</span></td>
    <td>${p.category}</td>
    <td><b>${fmt(priceOf(p))}원</b>${pctOf(p) ? `<span class="was">${fmt(p.price)}원</span>` : ""}</td>
    <td>${pctOf(p) ? pctOf(p) + "%" : "-"}</td>
    <td>${fmt(p.sales)}</td>
    <td>${fmt(p.reviews)}</td>
    <td>${p.rating || "-"}</td>
    <td>${p.date || "-"}</td>
    <td>${p.url ? `<a href="${p.url}" target="_blank" onclick="event.stopPropagation()">열기</a>` : "-"}</td>
  </tr>`).join("");
  const heads = [["", null], ["제품명", "name"], ["쇼핑몰", null], ["카테고리", null], ["판매가", "priceAsc"],
    ["할인", "sale"], ["판매량", "pop"], ["리뷰", "review"], ["평점", "rating"], ["등록일", "new"], ["링크", null]];
  document.getElementById("tableWrap").innerHTML = `<table>
    <thead><tr>${heads.map(([h, k]) => `<th${k ? ` data-sort="${k}"` : ""}>${h}${k && sortKey === k ? " ▼" : ""}</th>`).join("")}</tr></thead>
    <tbody>${rows}</tbody></table>`;
  document.querySelectorAll("th[data-sort]").forEach(th => th.onclick = () => {
    sortKey = th.dataset.sort;
    document.getElementById("sortSel").value = sortKey;
    render();
  });
  document.querySelectorAll("tbody tr").forEach(tr => tr.onclick = () => openEdit(tr.dataset.id));
  bindMallTags(document.getElementById("tableWrap"));
}

// 같은 제품명이 여러 몰에 있으면 묶어서 가격 비교
function renderCompare(list) {
  const groups = {};
  list.forEach(p => {
    const key = (p.name || "").replace(/\s+/g, " ").trim().toLowerCase();
    (groups[key] = groups[key] || []).push(p);
  });
  const multi = Object.values(groups).filter(g => g.length > 1);
  const single = Object.values(groups).filter(g => g.length === 1);
  const block = (g) => {
    const low = Math.min(...g.map(priceOf));
    return `<div class="cmpCard"><h3>${g[0].name}</h3>` +
      g.sort((a, b) => priceOf(a) - priceOf(b)).map(p => `
        <div class="cmpRow${priceOf(p) === low ? " low" : ""}" >
          <span class="mallTag" style="background:${mallColor(p.mall)}18;color:${mallColor(p.mall)};">● ${p.mall}</span>
          <span style="color:var(--sub);font-size:11.5px;">🔥 ${fmt(p.sales)} · 💬 ${fmt(p.reviews)} · ★ ${p.rating || "-"}</span>
          ${priceOf(p) === low ? '<span class="lowTag">최저가</span>' : ""}
          <span class="price">${fmt(priceOf(p))}원</span>
        </div>`).join("") + `</div>`;
  };
  document.getElementById("compareWrap").innerHTML =
    (multi.length
      ? `<div class="cmpNote" style="padding:0 0 10px;">✅ ${multi.length}개 제품이 2개 이상 쇼핑몰에서 판매 중이에요. 초록색이 최저가 판매처입니다.</div>` + multi.map(block).join("")
      : `<div class="cmpNote" style="padding:0 0 10px;">여러 쇼핑몰에 같이 올라간 제품이 없어요.</div>`) +
    (single.length ? `<div class="cmpNote" style="padding:14px 0 10px;">아래는 한 곳에서만 판매 중인 제품입니다.</div>` + single.map(block).join("") : "");
}

let editingId = null;
const $ = id => document.getElementById(id);

function openEdit(id) {
  editingId = id || null;
  const p = id ? products.find(x => x.id === id) : null;
  $("editTitle").textContent = p ? "제품 수정" : "제품 추가";
  $("delBtn").style.display = p ? "block" : "none";
  $("fName").value = p ? p.name : "";
  $("fMall").value = p ? p.mall : "";
  $("fCat").value = p ? p.category : "";
  $("fPrice").value = p ? p.price ?? "" : "";
  $("fSale").value = p ? p.sale ?? "" : "";
  $("fSales").value = p ? p.sales ?? "" : "";
  $("fReviews").value = p ? p.reviews ?? "" : "";
  $("fRating").value = p ? p.rating ?? "" : "";
  $("fDate").value = p ? p.date || "" : "";
  $("fUrl").value = p ? p.url || "" : "";
  $("fImg").value = p ? p.img || "" : "";
  $("fSoldout").checked = p ? !!p.soldout : false;
  $("editModal").classList.add("open");
  $("fName").focus();
}
$("cancelBtn").onclick = () => $("editModal").classList.remove("open");
$("saveBtn").onclick = () => {
  const name = $("fName").value.trim();
  const mall = $("fMall").value.trim();
  const cat = $("fCat").value.trim() || autoCategory(name);   // 비우면 제품명으로 자동 분류
  if (!name || !mall) { alert("제품명과 쇼핑몰은 필수입니다."); return; }
  const data = {
    name, mall, category: cat,
    price: +$("fPrice").value || 0,
    sale: $("fSale").value === "" ? null : +$("fSale").value,
    sales: +$("fSales").value || 0,
    reviews: +$("fReviews").value || 0,
    rating: $("fRating").value === "" ? null : +$("fRating").value,
    date: $("fDate").value || "",
    url: $("fUrl").value.trim(),
    img: $("fImg").value.trim(),
    soldout: $("fSoldout").checked,
  };
  if (editingId) {
    const i = products.findIndex(x => x.id === editingId);
    products[i] = { ...products[i], ...data };
  } else {
    products.push({ id: newId(), addedAt: Date.now(), ...data });
    isDemo = false;
  }
  persist();
  $("editModal").classList.remove("open");
  render();
};
$("delBtn").onclick = () => {
  if (!editingId) return;
  if (!confirm("이 제품을 삭제할까요?")) return;
  products = products.filter(x => x.id !== editingId);
  persist();
  $("editModal").classList.remove("open");
  render();
};

const CAT_RULES = [
  ["필기구",        /수정\s*테이프|연필깎이|샤프심|리필심/i],
  ["다이어리·일기장", /다이어리|일기|저널|산모수첩|diary|journal/i],
  ["플래너·스케줄러", /플래너|스케줄러|가계부|캘린더|달력|트래커|골트랙커|planner|tracker|calendar/i],
  ["독서·북커버",    /북커버|책갈피|북마크|독서|리딩|북트래커|book\s*cover|bookmark|book\s*tracker/i],
  ["바인더·앨범",    /바인더|앨범|콜렉트|티켓북|속지|포토카드|홀더|도감|binder|album/i],
  ["파우치·가방",    /파우치|가방|백팩|보스턴백|비치백|지갑|필통|케이스|월렛|pouch|bag|wallet|case/i],
  ["마스킹테이프",   /마스킹|마테|키스컷|롤\s*테이프|페이퍼\s*테이프|masking|washi\s*tape/i],
  ["스티커",        /스티커|씰|이형지|sticker|seal/i],
  ["카드·편지",     /카드|편지|엽서|봉투|card|letter|postcard/i],
  ["필기구",        /볼펜|연필|샤프|지우개|만년필|형광펜|글루\s*펜|잉크|겔펜|크레용|pen\b|pencil|eraser|crayon/i],
  ["노트·메모",     /노트|메모|수첩|단어장|필사|점착|후센|기록장|note|memo|notebook/i],
  ["리빙·굿즈",     /키링|머그|네임텍|바스켓|컵|keyring|key\s*ring|mug|basket/i],
  ["데스크·소품",   /스탬프|클립|문진|테이프\s*디스펜서|stamp|clip/i],
];
function autoCategory(name) {
  for (const [cat, re] of CAT_RULES) if (re.test(name || "")) return cat;
  return "기타";
}

// 같은 제품(제품명+쇼핑몰)이 이미 있으면 업데이트, 처음 보는 제품이면 NEW로 추가
function upsertProduct(o) {
  const key = ((o.name || "") + "|" + (o.mall || "")).replace(/\s+/g, " ").trim().toLowerCase();
  const ex = products.find(p =>
    ((p.name || "") + "|" + (p.mall || "")).replace(/\s+/g, " ").trim().toLowerCase() === key);
  if (ex) { Object.assign(ex, o); return "up"; }
  products.push({ id: newId(), addedAt: Date.now(), ...o });
  return "new";
}

function loadLinks() {
  try { links = JSON.parse(localStorage.getItem(LINK_KEY)) || []; } catch (e) { links = []; }
  let added = false;
  LINK_SEED.forEach(([name, url], i) => {
    if (!links.some(l => l.url === url)) {
      links.push({ id: "lnkSeed" + i, name, url, fav: false, addedAt: Date.now(), favAt: null });
      added = true;
    }
  });
  if (added) persistLinks();
  linkTab = links.some(l => l.fav) ? "fav" : "recent";
}
function persistLinks() { localStorage.setItem(LINK_KEY, JSON.stringify(links)); }
function hostOf(u) { try { return new URL(u).hostname.replace(/^www\./, ""); } catch (e) { return ""; } }
function escHtml(s) { return String(s ?? "").replace(/[&<>"']/g, m => ({ "&":"&amp;", "<":"&lt;", ">":"&gt;", '"':"&quot;", "'":"&#39;" }[m])); }
function timeAgo(t) {
  if (!t) return "";
  const d = Date.now() - t;
  if (d < 60000) return "방금 전";
  if (d < 3600000) return Math.floor(d / 60000) + "분 전";
  if (d < 86400000) return Math.floor(d / 3600000) + "시간 전";
  if (d < 86400000 * 30) return Math.floor(d / 86400000) + "일 전";
  return new Date(t).toLocaleDateString("ko-KR");
}

function renderLinks() {
  const favs = links.filter(l => l.fav);
  $("favCnt").textContent = favs.length ? favs.length : "";
  $("recentCnt").textContent = links.length ? links.length : "";
  updateHint();
  document.querySelectorAll(".linkTab[data-tab]").forEach(t =>
    t.classList.toggle("on", t.dataset.tab === linkTab));
  applyFold();

  // 💛 찜: 찜한 순서대로 / 📋 링크 모음: 전체를 최근 추가한 순서로
  const list = linkTab === "fav"
    ? favs.sort((a, b) => (b.favAt || 0) - (a.favAt || 0))
    : links.slice().sort((a, b) => (b.addedAt || 0) - (a.addedAt || 0));

  const wrap = $("linkList");
  if (!list.length) {
    wrap.innerHTML = `<div class="linkEmpty">${linkTab === "fav"
      ? "아직 찜한 쇼핑몰이 없어요. 주소 옆의 하트(♡)를 누르면 여기에 모여요."

    return;

  wrap.innerHTML = list.map(l => `<div class="linkItem" data-id="${l.id}">
    <img class="favicon" src="https://www.google.com/s2/favicons?domain=${encodeURIComponent(hostOf(l.url))}&sz=32" onerror="this.outerHTML='🛍️'">
    <a href="${escHtml(l.url)}" target="_blank" rel="noopener" title="${escHtml(l.url)}">${escHtml(l.name)}</a>
    <button type="button" class="star${l.fav ? " on" : ""}" title="${l.fav ? "찜 해제" : "찜하기"}">${l.fav ? "♥" : "♡"}</button>
    <button type="button" class="del" title="삭제">✕</button>
  </div>`).join("");

  wrap.querySelectorAll(".linkItem").forEach(item => {
    const id = item.dataset.id;

      const l = links.find(x => x.id === id);
      l.fav = !l.fav;

      if (!confirm(`'${l.name}' 주소를 삭제할까요?`)) return;
      links = links.filter(x => x.id !== id);
      persistLinks(); renderLinks();
    };
  });
}

// (봇을 막거나 스크립트로만 그려지는 사이트는 수집이 안 될 수 있어요)
async function fetchMallProducts(link) {
  let added = 0;

  // 1차: HTML 프록시로 페이지를 받아 DOM에서 추출
  const proxies = [
    u => "https://api.allorigins.win/raw?url=" + encodeURIComponent(u),
    u => "https://corsproxy.io/?url=" + encodeURIComponent(u),
    u => "https://api.codetabs.com/v1/proxy?quest=" + encodeURIComponent(u),
  ];
  for (const p of proxies) {
    try {
      const res = await fetch(p(link.url), { signal: AbortSignal.timeout(12000) });
      if (!res.ok) continue;
      const t = await res.text();
      if (!t || t.length < 500) continue;
      added = parseHtmlProducts(t, link);
      if (added) break;
    } catch (err) {}
  }

  // 2차: Jina 리더(웹페이지→텍스트 변환 중계)로 재시도 — 성공률이 가장 높음
  if (!added) {
    try {
      const res = await fetch("https://r.jina.ai/" + link.url, { signal: AbortSignal.timeout(25000) });
      if (res.ok) added = parseMarkdownProducts(await res.text(), link);
    } catch (err) {}
  }

  if (added) { isDemo = false; persist(); render(); }
  return { ok: true, count: added };
}

function parseHtmlProducts(html, link) {
  let base; try { base = new URL(link.url); } catch (err) { return 0; }
  const doc = new DOMParser().parseFromString(html, "text/html");
  const seen = new Set();
  let added = 0;
  const anchors = doc.querySelectorAll(
    'a[href*="/product/"], a[href*="product_no="], a[href*="/products/"], a[href*="/goods/"], a[href*="detail.php"], a[href*="detail.html"]');
  for (const a of anchors) {
    if (added >= 20) break;
    const href = a.getAttribute("href") || "";
    if (!href || href.startsWith("#") || href.toLowerCase().startsWith("javascript")) continue;
    let abs; try { abs = new URL(href, base).href; } catch (err) { continue; }
    if (seen.has(abs)) continue;

    const img = a.querySelector("img");
    let name = ((img && img.getAttribute("alt")) || "").trim();
    if (!name) name = (a.textContent || "").replace(/\s+/g, " ").trim();
    if (!name || name.length < 2 || name.length > 80) continue;
    if (/상세보기|더보기|바로가기|리뷰|장바구니|찜하기|버튼|로그인/.test(name)) continue;

    const scope = a.closest("li, .item, .prd, .product, article, div") || a;
    const m = (scope.textContent || "").match(/([\d,]{2,10})\s*원/);
    const price = m ? (+m[1].replace(/,/g, "") || 0) : 0;

    let imgUrl = "";
    if (img) {
      const src = img.getAttribute("src") || img.getAttribute("data-src") || "";
      if (src && !src.startsWith("data:")) { try { imgUrl = new URL(src, base).href; } catch (err) {} }
    }

    seen.add(abs);
    const r = upsertProduct({
      name, mall: link.name, category: autoCategory(name),
      price, sale: null, sales: 0, reviews: 0, rating: null,
      date: "", url: abs, img: imgUrl, soldout: false,
    });
    if (r === "new") added++;
  }
  return added;
}

// Jina 리더가 돌려주는 텍스트에서 [제품명](상품링크) 패턴을 추출
function parseMarkdownProducts(md, link) {
  // 상품링크에 붙은 이미지 짝: [![..](이미지주소)](상품링크)
  const imgMap = {};
  const imre = /\[!\[[^\]]*\]\((https?:\/\/[^\s)]+)\)\]\((https?:\/\/[^\s)]+)\)/g;
  let im;
  while ((im = imre.exec(md))) imgMap[im[2]] = im[1];

  const isProductUrl = u => /\/product\/|product_no=|\/products\/|\/goods\/|detail\.(php|html)/.test(u);
  const seen = new Set();
  let added = 0, m;
  const re = /\[([^\]\n]{2,80})\]\((https?:\/\/[^\s)]+)\)/g;
  while ((m = re.exec(md)) && added < 20) {
    const name = m[1].replace(/\s+/g, " ").trim();
    const url = m[2];
    if (!isProductUrl(url) || seen.has(url)) continue;
    if (!name || name.startsWith("!") || /^https?:/.test(name)) continue;
    if (/^Image ?\d*$|더보기|리뷰|장바구니|바로가기|상세보기|찜하기/.test(name)) continue;
    const tail = md.slice(m.index, m.index + 300);
    const pm = tail.match(/([\d,]{2,10})\s*원/);
    const price = pm ? (+pm[1].replace(/,/g, "") || 0) : 0;
    seen.add(url);
    const r = upsertProduct({
      name, mall: link.name, category: autoCategory(name),
      price, sale: null, sales: 0, reviews: 0, rating: null,
      date: "", url, img: imgMap[url] || "", soldout: false,
    });
    if (r === "new") added++;
  }
  return added;
}
async function collectFromLink(lk) {
  const r = await fetchMallProducts(lk);
  if (r.count) {
    sortKey = "new"; $("sortSel").value = "new"; render();
    alert(`'${lk.name}'에서 제품 ${r.count}개를 가져왔어요!\n🆕 NEW 표시와 함께 최신순 맨 앞에 보여요.`);
  } else {
    alert(`'${lk.name}' 주소는 저장됐지만, 이 사이트는 자동 수집이 막혀 있어요.\n(봇 차단 또는 스크립트 렌더링 방식)\nClaude에게 "이 쇼핑몰 제품 수집해줘"라고 요청하면 채워드릴 수 있어요.`);
  }
}

// ═══════════════ 검색 키워드 저장 ═══════════════
const KW_KEY = "mallDashboard.kw.v1";
let keywords = [];    // 최근 검색 키워드 (최신순, 최대 12개)
function loadKw() { try { keywords = JSON.parse(localStorage.getItem(KW_KEY)) || []; } catch (e) { keywords = []; } }
function persistKw() { localStorage.setItem(KW_KEY, JSON.stringify(keywords)); }

function renderKeywords() {
  const row = $("kwRow");
  if (!keywords.length) { row.style.display = "none"; row.innerHTML = ""; return; }
  row.style.display = "flex";
  row.innerHTML = '<span class="rowLbl">키워드</span>' + keywords.map(k =>
    `<button class="chip kw${filter.q === k.toLowerCase() ? " on" : ""}" data-kw="${escHtml(k)}">${escHtml(k)}<span class="x">✕</span></button>`
  ).join("");
  row.querySelectorAll("[data-kw]").forEach(b => b.onclick = e => {
    const kw = b.dataset.kw;
    if (e.target.classList.contains("x")) {          // ✕ → 키워드 삭제
      keywords = keywords.filter(x => x !== kw);
      persistKw();
      if (filter.q === kw.toLowerCase()) { filter.q = ""; $("searchBox").value = ""; }
      render();
      return;
    }
    const off = filter.q === kw.toLowerCase();       // 켜져 있으면 다시 눌러 해제
    filter.q = off ? "" : kw.toLowerCase();
    $("searchBox").value = off ? "" : kw;
    render();
  });
}
// 검색창에서 Enter → 키워드로 저장 (클릭해서 재사용)
$("searchBox").addEventListener("keydown", e => {
  if (e.key !== "Enter") return;
  const q = e.target.value.trim();
  if (!q) return;
  keywords = [q, ...keywords.filter(x => x !== q)].slice(0, 12);
  persistKw();
  render();
});

// ═══════════════ 필터/정렬 이벤트 ═══════════════
$("searchBox").oninput = e => { filter.q = e.target.value.trim().toLowerCase(); render(); };
$("groupToggle").onchange = e => { grouped = e.target.checked; render(); };
$("sortSel").onchange = e => {
  sortKey = e.target.value;
  if (sortKey === "rand") randSeed = {};   // 랜덤순 다시 선택 → 새로 섞기
  render();
};
$("hideSoldout").onchange = e => { filter.hideSoldout = e.target.checked; render(); };
$("compareToggle").onchange = e => { compareMode = e.target.checked; syncViewBtns(); render(); };
// 이미지만 ↔ 이름·가격 보기 토글 (처음엔 이미지만 보이게 시작)
let showInfo = false;
document.body.classList.add("hideInfo");
$("infoToggleBtn").textContent = "📝 이름·가격 보기";
$("infoToggleBtn").classList.add("on");
$("infoToggleBtn").onclick = () => {
  showInfo = !showInfo;
  document.body.classList.toggle("hideInfo", !showInfo);
  $("infoToggleBtn").textContent = showInfo ? "🖼️ 이미지만" : "📝 이름·가격 보기";
  $("infoToggleBtn").classList.toggle("on", !showInfo);
  if (!showInfo && (view !== "grid" || compareMode)) {   // 이미지 모드는 카드 보기에서
    view = "grid"; compareMode = false; $("compareToggle").checked = false;
    syncViewBtns(); render();
  }
};
$("viewGridBtn").onclick = () => { view = "grid"; compareMode = false; $("compareToggle").checked = false; syncViewBtns(); render(); };
$("viewTableBtn").onclick = () => { view = "table"; compareMode = false; $("compareToggle").checked = false; syncViewBtns(); render(); };
function syncViewBtns() {
  $("viewGridBtn").classList.toggle("on", view === "grid" && !compareMode);
  $("viewTableBtn").classList.toggle("on", view === "table" && !compareMode);
}

// 모달 바깥 클릭으로 닫기
document.querySelectorAll(".modalBg").forEach(m => m.addEventListener("click", e => {
  if (e.target === m) m.classList.remove("open");
}));
window.addEventListener("keydown", e => {
  if (e.key === "Escape") document.querySelectorAll(".modalBg").forEach(m => m.classList.remove("open"));
});

// ═══════════════ 시작 ═══════════════
load();
loadLinks();
loadKw();
syncViewBtns();
render();
renderLinks();
</script>
